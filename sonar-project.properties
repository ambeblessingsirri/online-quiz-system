# ══════════════════════════════════════════════════════════════════
# DevOps Tool 3: SonarQube Configuration
# Static code analysis and code quality gates
# ══════════════════════════════════════════════════════════════════

sonar.projectKey=online-quiz-system
sonar.projectName=Online Quiz & Practice System
sonar.projectVersion=1.0.0
sonar.host.url=http://localhost:9000

# Source directories
sonar.sources=backend,frontend/src
sonar.exclusions=**/node_modules/**,**/tests/**,**/dist/**,**/__pycache__/**

# Python backend analysis
sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml

# JavaScript/React frontend analysis
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Code quality rules
sonar.coverage.exclusions=**/tests/**,**/migrations/**
sonar.cpd.exclusions=**/tests/**

# Quality Gate thresholds
# - Coverage >= 70%
# - Duplicated lines < 10%
# - Maintainability rating: A
# - Reliability rating: A
