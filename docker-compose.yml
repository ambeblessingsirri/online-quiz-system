# ══════════════════════════════════════════════════════════════════
# DevOps Tool 1: Docker Compose
# Orchestrates backend, frontend, and SonarQube services
# ══════════════════════════════════════════════════════════════════
version: '3.9'

services:
  # ── Flask Backend API ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: quiz-backend
    ports:
      - "5000:5000"
    volumes:
      - quiz-data:/app/instance
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - quiz-network

  # ── React Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: quiz-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - quiz-network

  # ── DevOps Tool 3: SonarQube ───────────────────────────────────
  # Static code analysis & quality gate
  sonarqube:
    image: sonarqube:community
    container_name: quiz-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-logs:/opt/sonarqube/logs
    restart: unless-stopped
    networks:
      - quiz-network

volumes:
  quiz-data:
  sonar-data:
  sonar-logs:

networks:
  quiz-network:
    driver: bridge
