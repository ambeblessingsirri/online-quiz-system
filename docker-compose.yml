version: '3.8'

services:
  # ── Node.js Application ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: quizmaster_app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - quizmaster_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MongoDB (local dev only — production uses Atlas) ───────────
  mongo:
    image: mongo:7-jammy
    container_name: quizmaster_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: quizsystem
    volumes:
      - mongo_data:/data/db
    networks:
      - quizmaster_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: quizmaster_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - quizmaster_net

volumes:
  mongo_data:
    driver: local

networks:
  quizmaster_net:
    driver: bridge
